name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release-token:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'OutcomeToken (SEP-41 outcome share) build for ${{ github.ref_name }}'
      relative_path: '["contracts/token"]'
      package: 'outcome-token'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-market:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Market (outcome-market settlement) build for ${{ github.ref_name }}'
      relative_path: '["contracts/market"]'
      package: 'market'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
